definitions:
  apikey.ApikeyItem:
    properties:
      created_at:
        description: 创建时间
        type: string
      description:
        description: 描述
        type: string
      expires_at:
        description: 过期时间
        type: string
      id:
        description: API Key ID
        type: string
      is_active:
        description: 是否启用
        type: boolean
      key:
        description: 脱敏密钥
        type: string
      key_prefix:
        description: 密钥前缀
        type: string
      last_used_at:
        description: 最后使用时间
        type: string
      name:
        description: API Key名称
        type: string
    type: object
  apikey.CreateRequest:
    properties:
      description:
        description: 描述
        type: string
      expires_at:
        description: 过期时间（NULL=永不过期）
        type: string
      name:
        description: API Key名称
        maxLength: 64
        minLength: 1
        type: string
    required:
    - name
    type: object
  apikey.CreateResponse:
    properties:
      created_at:
        description: 创建时间（手动映射，BaseEntity.CreatedAt 的 json:"-"）
        type: string
      description:
        description: 描述
        type: string
      expires_at:
        description: 过期时间
        type: string
      id:
        description: API Key ID
        type: string
      is_active:
        description: 是否启用
        type: boolean
      key:
        description: 完整密钥（仅此一次）
        type: string
      key_prefix:
        description: 密钥前缀
        type: string
      name:
        description: API Key名称
        type: string
    type: object
  apikey.DetailResponse:
    properties:
      created_at:
        description: 创建时间
        type: string
      description:
        description: 描述
        type: string
      expires_at:
        description: 过期时间
        type: string
      id:
        description: API Key ID
        type: string
      is_active:
        description: 是否启用
        type: boolean
      key:
        description: 脱敏密钥（前8+...+后8）
        type: string
      key_prefix:
        description: 密钥前缀
        type: string
      last_used_at:
        description: 最后使用时间
        type: string
      name:
        description: API Key名称
        type: string
    type: object
  apikey.ResetResponse:
    properties:
      created_at:
        description: 创建时间
        type: string
      description:
        description: 描述
        type: string
      expires_at:
        description: 过期时间
        type: string
      id:
        description: API Key ID
        type: string
      is_active:
        description: 是否启用
        type: boolean
      key:
        description: 新完整密钥（仅此一次）
        type: string
      key_prefix:
        description: 密钥前缀
        type: string
      name:
        description: API Key名称
        type: string
    type: object
  apikey.UpdateRequest:
    properties:
      description:
        description: 描述（指针区分零值和未传）
        type: string
      expires_at:
        description: 过期时间
        type: string
      is_active:
        description: 是否启用（指针区分零值和未传）
        type: boolean
      name:
        description: API Key名称
        type: string
    type: object
  auth.InitializeRequest:
    properties:
      email:
        description: 邮箱地址
        type: string
      password:
        description: 登录密码
        maxLength: 64
        minLength: 6
        type: string
      username:
        description: 用户名
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  auth.LoginRequest:
    properties:
      account:
        description: 账号（用户名或邮箱）
        type: string
      password:
        description: 登录密码
        type: string
    required:
    - account
    - password
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        description: 刷新令牌
        type: string
    required:
    - refresh_token
    type: object
  auth.StatusResponse:
    properties:
      is_initial:
        description: 系统是否为初始状态（true=未初始化）
        type: boolean
    type: object
  auth.TokenResponse:
    properties:
      access_token:
        description: 访问令牌
        type: string
      expires_in:
        description: 过期时间（秒）
        type: integer
      refresh_token:
        description: 刷新令牌
        type: string
    type: object
  common.BaseResponse:
    properties:
      code:
        type: integer
      context:
        type: string
      data: {}
      error_message:
        type: string
      message:
        type: string
      output:
        type: string
      overhead:
        type: integer
    type: object
  health.PingResponse:
    properties:
      app:
        type: string
      database_ready:
        type: boolean
      redis_ready:
        type: boolean
      timestamp:
        type: integer
      version:
        type: string
    type: object
  project.CreateProjectRequest:
    properties:
      alias_name:
        description: 项目别名
        type: string
      description:
        description: 项目描述
        type: string
      match_path:
        description: 项目路径匹配列表
        items:
          type: string
        type: array
      name:
        description: 项目名称
        type: string
    required:
    - match_path
    - name
    type: object
  project.ProjectListResponse:
    properties:
      items:
        description: 项目列表
        items:
          $ref: '#/definitions/project.ProjectResponse'
        type: array
      total:
        description: 总数量
        type: integer
    type: object
  project.ProjectResponse:
    properties:
      alias_name:
        description: 项目别名
        type: string
      created_at:
        description: 创建时间
        type: string
      description:
        description: 项目描述
        type: string
      id:
        description: 项目ID
        type: string
      match_path:
        description: 项目路径匹配列表
        items:
          type: string
        type: array
      name:
        description: 项目名称
        type: string
      updated_at:
        description: 更新时间
        type: string
    type: object
  project.UpdateProjectRequest:
    properties:
      alias_name:
        description: 项目别名
        type: string
      description:
        description: 项目描述
        type: string
      match_path:
        description: 项目路径匹配列表
        items:
          type: string
        type: array
      name:
        description: 项目名称
        type: string
    required:
    - name
    type: object
  qa.CreateSessionRequest:
    properties:
      agent:
        description: Agent名称
        type: string
      project_id:
        description: 关联项目ID
        type: string
      title:
        description: 会话标题
        type: string
      type:
        description: temporary/permanent
        type: string
    required:
    - project_id
    type: object
  qa.QaConfigResponse:
    properties:
      max_retries:
        description: qa_get_answer 最大重试次数
        type: integer
      poll_slice:
        description: qa_get_answer 单次阻塞上限（秒）
        type: integer
      runtime_domain:
        description: 运行时域名
        type: string
      session_ttl:
        description: Session TTL（秒）
        type: integer
    type: object
  qa.QuestionDetailResponse:
    properties:
      answer:
        description: 回答数据
      answered_at:
        description: 回答时间
        type: string
      batch:
        description: 分批信息
      config:
        description: 题型特有配置
      created_at:
        description: 创建时间
        type: string
      description:
        description: 描述
        type: string
      group_label:
        description: 分组标签
        type: string
      id:
        description: 问题ID
        type: string
      options:
        description: 选项配置
      session_id:
        description: 所属Session
        type: string
      status:
        description: 状态
        type: string
      supplements:
        description: 关联补充内容
        items:
          $ref: '#/definitions/qa.SupplementResponse'
        type: array
      title:
        description: 标题
        type: string
      type:
        description: 题型
        type: string
    type: object
  qa.QuestionSummaryResponse:
    properties:
      answer:
        description: 回答数据
      answered_at:
        description: 回答时间
        type: string
      batch:
        description: 分批信息
      config:
        description: 题型特有配置
      created_at:
        description: 创建时间
        type: string
      group_label:
        description: 分组标签
        type: string
      id:
        description: 问题ID
        type: string
      media:
        description: 多媒体数据
      options:
        description: 选项配置
      status:
        description: pending/answered/skipped
        type: string
      supplement:
        description: 是否携带补充内容
        type: boolean
      supplements:
        description: 关联补充内容
        items:
          $ref: '#/definitions/qa.SupplementResponse'
        type: array
      title:
        description: 标题
        type: string
      type:
        description: 题型
        type: string
    type: object
  qa.SessionDetailResponse:
    properties:
      agent:
        description: Agent名称
        type: string
      created_at:
        description: 创建时间
        type: string
      expires_at:
        description: 过期时间（永久为空）
        type: string
      hash:
        description: 会话哈希标识
        type: string
      id:
        description: Session ID
        type: string
      online_devices:
        description: 在线设备数
        type: integer
      project_id:
        description: 关联项目ID
        type: string
      project_name:
        description: 关联项目名称
        type: string
      questions:
        description: 问题列表
        items:
          $ref: '#/definitions/qa.QuestionSummaryResponse'
        type: array
      status:
        description: active/expired/deleted
        type: string
      title:
        description: 会话标题
        type: string
      type:
        description: temporary/permanent
        type: string
      updated_at:
        description: 更新时间
        type: string
    type: object
  qa.SessionListResponse:
    properties:
      items:
        description: Session列表
        items:
          $ref: '#/definitions/qa.SessionResponse'
        type: array
      total:
        description: 总数量
        type: integer
    type: object
  qa.SessionResponse:
    properties:
      agent:
        description: Agent名称
        type: string
      created_at:
        description: 创建时间
        type: string
      expires_at:
        description: 过期时间（永久为空）
        type: string
      hash:
        description: 会话哈希标识
        type: string
      id:
        description: Session ID
        type: string
      online_devices:
        description: 在线设备数
        type: integer
      project_id:
        description: 关联项目ID
        type: string
      project_name:
        description: 关联项目名称
        type: string
      status:
        description: active/expired/deleted
        type: string
      title:
        description: 会话标题
        type: string
      type:
        description: temporary/permanent
        type: string
      updated_at:
        description: 更新时间
        type: string
    type: object
  qa.SupplementResponse:
    properties:
      content:
        description: 内容
        type: string
      content_type:
        description: markdown/html
        type: string
      created_at:
        description: 创建时间
        type: string
      id:
        description: 补充内容ID
        type: string
      target_id:
        description: 关联ID
        type: string
      target_type:
        description: question/option
        type: string
      updated_at:
        description: 更新时间
        type: string
    type: object
  qa.UpdateQaConfigRequest:
    properties:
      max_retries:
        description: qa_get_answer 最大重试次数（达到后返回STOPPED），nil不更新
        type: integer
      poll_slice:
        description: qa_get_answer 单次阻塞上限（秒），nil不更新
        type: integer
      runtime_domain:
        description: 运行时域名，nil不更新
        type: string
      session_ttl:
        description: Session TTL（秒），nil不更新
        type: integer
    type: object
  user.UserInfoResponse:
    properties:
      email:
        description: 邮箱地址
        type: string
      username:
        description: 用户名
        type: string
    type: object
  xModels.PageResponse-array_apikey_ApikeyItem:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/apikey.ApikeyItem'
        type: array
      size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
info:
  contact: {}
paths:
  /api/v1/apikey:
    get:
      consumes:
      - application/json
      description: 按 page/size 分页查询 API 密钥列表，密钥以脱敏形式展示
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量（最大200）
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功，密钥脱敏展示
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/xModels.PageResponse-array_apikey_ApikeyItem'
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 分页获取API密钥列表'
      tags:
      - API密钥接口
    post:
      consumes:
      - application/json
      description: 提交名称与可选描述/过期时间创建 API 密钥，返回完整密钥（仅此一次）
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apikey.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回完整密钥（仅此一次）
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apikey.CreateResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 创建API密钥'
      tags:
      - API密钥接口
  /api/v1/apikey/{id}:
    delete:
      consumes:
      - application/json
      description: 根据密钥 ID 删除指定的 API 密钥，删除后不可恢复
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: API密钥ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: 密钥不存在
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 删除API密钥'
      tags:
      - API密钥接口
    get:
      consumes:
      - application/json
      description: 根据密钥 ID 查询单个 API 密钥详情，密钥以脱敏形式展示
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: API密钥ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功，密钥脱敏展示
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apikey.DetailResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: 密钥不存在
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 获取API密钥详情'
      tags:
      - API密钥接口
    put:
      consumes:
      - application/json
      description: 更新指定 ID 的 API 密钥信息（名称、描述、过期时间、启用状态，字段可选）
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: API密钥ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apikey.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: 密钥不存在
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 更新API密钥'
      tags:
      - API密钥接口
  /api/v1/apikey/{id}/reset:
    post:
      consumes:
      - application/json
      description: 根据密钥 ID 重置密钥，生成新密钥并返回完整密钥（仅此一次）
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: API密钥ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 重置成功，返回新完整密钥（仅此一次）
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apikey.ResetResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: 密钥不存在
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 重置API密钥'
      tags:
      - API密钥接口
  /api/v1/auth/initialize:
    post:
      consumes:
      - application/json
      description: 首次部署时提交用户名、邮箱、密码，初始化系统管理员账户；已初始化时拒绝
      parameters:
      - description: 初始化请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.InitializeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 初始化成功
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "409":
          description: 系统已初始化
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[超管] 系统初始化'
      tags:
      - 认证接口
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 校验账号（用户名或邮箱）与密码，签发访问令牌与刷新令牌
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回令牌
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.TokenResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 账号或密码错误
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 用户登录'
      tags:
      - 认证接口
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 根据刷新令牌撤销登录会话，需携带有效访问令牌
      parameters:
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 登出请求（传入 refresh_token）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: '[管理] 用户登出'
      tags:
      - 认证接口
  /api/v1/auth/refresh:
    post:
      consumes:
